---
# `tracing_override` uses the same syntax as `RUST_LOG` / tracing_subscriber's
# EnvFilter. The DEBUG targets below are enabled to diagnose the
# `execute_rave` hang tracked in the hot-2-mhot bridge (the conductor looks
# healthy by every passive signal, so we need workflow-level traces the
# next time a call stalls). Retune down to `~` / `info` once the root cause
# is identified.
tracing_override: "info,holochain::core::workflow=debug,holochain_cascade=debug,holochain_state=debug,transactor=debug"
data_root_path: "/var/lib/holochain/data"
keystore:
  type: lair_server
  connection_url: ~ # Will be filled by setup script
admin_interfaces:
  - driver:
      type: websocket
      port: 8800
      danger_bind_addr: ~
      allowed_origins: "*"
network:
  base64_auth_material_bootstrap: ~ # Will be filled by setup script
  base64_auth_material_relay: ~ # Will be filled by setup script
  bootstrap_url: https://hc-auth-iroh-unyt.holochain.org/
  signal_url: http://not-used:1234
  relay_url: https://iroh-relay-unyt.holochain.org
  target_arc_factor: 1
  advanced: null
  request_timeout_s: 60
db_sync_strategy: Fast
tuning_params: null
tracing_scope: null
